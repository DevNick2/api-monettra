services:
  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always

  db:
    image: pgvector/pgvector:pg17
    container_name: db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 10
      start_period: 60s
      timeout: 5s
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monettra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/.venv
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${TRAEFIK_HOST}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=3000

  celery-worker:
    container_name: celery-worker
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      uv run celery -A src.shared.services.celery_app.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q celery
    env_file:
      - .env.development
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/.venv
    restart: unless-stopped

networks:
  traefik-proxy:
    external: true

volumes:
  redis_data:
  postgres_data:

